<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
  <title>Rock-Paper-Scissor Game</title>
</head>

<body>
  <p class="title">Rock-Paper-Scissor</p>
  
  <button id="rock" class="move-button">
    <img src="images/rock-emoji.png" alt="Rock" class="move-icon">
  </button>
  <button id="paper" class="move-button">
    <img src="images/paper-emoji.png" alt="Paper" class="move-icon">
  </button>
  <button id="scissors" class="move-button">
    <img src="images/scissors-emoji.png" alt="Scissor" class="move-icon">
  </button>
 
  <p class="js-result result"></p>
  <p class="js-moves"></p>
  <p class="js-score score"></p>

  <button id="resetScore" class="reset-score-button">Reset Score</button>
  <button class="auto-play-button" onclick="
      autoPlay();
    ">Auto Play</button>

  <script src="script.js"></script>
</body>
</html>
